name: Deploy para GitHub Pages

on:
  push:
    branches: ["main"] # Verifique se seu branch principal chama main ou master

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependências
        run: npm install

      - name: Build do Projeto
        run: npm run build

      - name: Upload do artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # O Vite joga os arquivos prontos aqui

      - name: Deploy
        uses: actions/deploy-pages@v4
