<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Livre - Launcher de Acessibilidade</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #facc15;
            color: #000;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            border: 5px solid #000;
            padding: 40px;
            background: #fff;
            box-shadow: 12px 12px 0px 0px rgba(0,0,0,1);
        }
        h1 { 
            margin-top: 0; 
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: -1px;
        }
        p { 
            font-size: 1.4rem; 
            line-height: 1.4;
            font-weight: 500;
        }
        .badge {
            display: inline-block;
            padding: 15px 30px;
            background: #000;
            color: #fff;
            text-decoration: none;
            font-weight: 900;
            margin-top: 20px;
            font-size: 1.2rem;
            transition: transform 0.1s;
        }
        .badge:active {
            transform: translate(2px, 2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Acesso Livre</h1>
        <p>Launcher Android nativo focado em acessibilidade extrema.</p>
        <p>Comandos de voz, trackpad assistivo e interface Neo-Brutalista feita para quem precisa de simplicidade.</p>
        <a href="https://github.com/fabinho0210/Acesso-Livre" class="badge">PROJETO NO GITHUB</a>
    </div>
</body>
</html>
