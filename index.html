<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Acesso Livre - Launcher de Acessibilidade</title>
    
    <!-- Meta Tags para PWA/Mobile -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#facc15">
    
    <!-- Tailwind Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Inter"', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <!-- Styles -->
    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply antialiased overflow-hidden select-none touch-none;
                height: 100dvh;
                width: 100vw;
            }
        }
        @layer utilities {
            .safe-top { padding-top: env(safe-area-inset-top); }
            .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
            .h-dvh { height: 100dvh; }
        }
    </style>

    <style>
        /* Animações CSS puro para substituir Framer Motion */
        .page-transition {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
        }
        .modal-enter {
            animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }
        .scale-on-hover:hover {
            transform: scale(1.05);
        }
        .active-press:active {
            transform: translate(4px, 4px);
        }
        .ripple {
            animation: ripple-effect 1s linear forwards;
            position: absolute;
            border-radius: 50%;
            border: 2px solid rgba(0,0,0,0.2);
            pointer-events: none;
        }
        @keyframes ripple-effect {
            0% { transform: scale(0); opacity: 0.8; }
            100% { transform: scale(20); opacity: 0; }
        }
        /* Cursor Dwell Circle Anim */
        .dwell-circle {
            transition: stroke-dashoffset 0.15s linear;
        }
        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-[#f5f5f0]">
    <div id="root"></div>

    <!-- Bibliotecas Externas (CDNs Estáveis) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // Utilitário de Classe
        const cn = (...classes) => classes.filter(Boolean).join(' ');

        // Componente de Ícone Lucide
        const Icon = ({ name, size = 32, className = '', strokeWidth = 3 }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    iconRef.current.innerHTML = '';
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', name);
                    iconRef.current.appendChild(i);
                    window.lucide.createIcons({
                        icons: { [name]: window.lucide.icons[name] },
                        attrs: { 
                            class: className, 
                            width: size, 
                            height: size, 
                            'stroke-width': strokeWidth 
                        }
                    });
                }
            }, [name, size, className, strokeWidth]);
            return <span ref={iconRef} className="inline-block leading-none" />;
        };

        // Traduções
        const translations = {
            pt: {
                title: "ACESSO LIVRE",
                settings: "Ajustes",
                voiceGuide: "Voz",
                trackpad: "ÁREA DE TOQUE",
                back: "VOLTAR",
                home: "INÍCIO",
                help: "AJUDA",
                newApp: "NOVO APP",
                emergency: "EMERGÊNCIA",
                phone: "TELEFONE",
                contrast: "ALTO CONTRASTE",
                assistive: "MODO ASSISTIVO",
                done: "CONCLUIR",
                youSaid: "Você disse",
                clockFormat: { hour: '2-digit', minute: '2-digit' }
            },
            en: {
                title: "FREE ACCESS",
                settings: "Settings",
                voiceGuide: "Voice",
                trackpad: "TOUCH AREA",
                back: "BACK",
                home: "HOME",
                help: "HELP",
                newApp: "NEW APP",
                emergency: "EMERGENCY",
                phone: "PHONE",
                contrast: "HIGH CONTRAST",
                assistive: "ASSISTIVE MODE",
                done: "DONE",
                youSaid: "You said",
                clockFormat: { hour: '2-digit', minute: '2-digit' }
            }
        };

        function App() {
            // Estado Global
            const [lang, setLang] = useState(localStorage.getItem('al_lang') || 'pt');
            const [isDarkMode, setIsDarkMode] = useState(localStorage.getItem('al_dark') === 'true');
            const [highContrast, setHighContrast] = useState(localStorage.getItem('al_contrast') === 'true');
            const [isAssistiveMode, setIsAssistiveMode] = useState(localStorage.getItem('al_assistive') !== 'false');
            const [cursorPos, setCursorPos] = useState({ x: 50, y: 50 });
            const [dwellEnabled, setDwellEnabled] = useState(true);
            const [dwellProgress, setDwellProgress] = useState(0);
            const [showSettings, setShowSettings] = useState(false);
            const [isVoiceActive, setIsVoiceActive] = useState(false);
            const [lastCommand, setLastCommand] = useState('');
            const [currentTime, setCurrentTime] = useState(new Date());

            const t = translations[lang];
            const dwellTimerRef = useRef(null);
            const hoveredIdRef = useRef(null);

            // Relógio
            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            // Cursor e Dwell
            const executeClick = useCallback(() => {
                const headerH = 100;
                const mainH = isAssistiveMode ? (window.innerHeight * 0.6) - headerH : window.innerHeight - headerH;
                const xPx = (cursorPos.x / 100) * window.innerWidth;
                const yPx = (cursorPos.y / 100) * mainH + headerH;
                
                const el = document.elementFromPoint(xPx, yPx);
                const btn = el?.closest('button') || el?.closest('a');
                if (btn) {
                    btn.click();
                    if ('vibrate' in navigator) navigator.vibrate(50);
                }
            }, [cursorPos, isAssistiveMode]);

            useEffect(() => {
                if (!isAssistiveMode || !dwellEnabled) return;

                const headerH = 100;
                const mainH = (window.innerHeight * 0.6) - headerH;
                const xPx = (cursorPos.x / 100) * window.innerWidth;
                const yPx = (cursorPos.y / 100) * mainH + headerH;
                const el = document.elementFromPoint(xPx, yPx);
                const currentId = el?.id || el?.closest('button')?.id || null;

                if (currentId && currentId !== 'trackpad' && currentId !== hoveredIdRef.current) {
                    hoveredIdRef.current = currentId;
                    setDwellProgress(0);
                    if (dwellTimerRef.current) clearInterval(dwellTimerRef.current);
                    
                    let progress = 0;
                    dwellTimerRef.current = setInterval(() => {
                        progress += 5;
                        setDwellProgress(progress);
                        if (progress >= 100) {
                            executeClick();
                            clearInterval(dwellTimerRef.current);
                        }
                    }, 75);
                } else if (!currentId || currentId === 'trackpad') {
                    hoveredIdRef.current = null;
                    setDwellProgress(0);
                    if (dwellTimerRef.current) clearInterval(dwellTimerRef.current);
                }
            }, [cursorPos, dwellEnabled, isAssistiveMode, executeClick]);

            // Trackpad
            const handleMove = (e) => {
                const touch = e.touches ? e.touches[0] : e;
                const rect = document.getElementById('trackpad').getBoundingClientRect();
                const x = ((touch.clientX - rect.left) / rect.width) * 100;
                const y = ((touch.clientY - rect.top) / rect.height) * 100;
                setCursorPos({ x: Math.max(0, Math.min(100, x)), y: Math.max(0, Math.min(100, y)) });
            };

            // Estilos de Tema
            const themeClass = highContrast 
                ? "bg-black text-white" 
                : (isDarkMode ? "bg-zinc-950 text-white" : "bg-[#f5f5f0] text-gray-900");
            
            const btnClass = (color) => cn(
                "p-8 border-4 border-black rounded-[40px] flex flex-col items-center justify-center gap-4 transition-all active-press shadow-[8px_8px_0px_0px_rgba(0,0,0,1)]",
                highContrast ? "bg-black border-white text-white" : `${color} text-white`
            );

            return (
                <div className={cn("fixed inset-0 flex flex-col safe-top safe-bottom font-sans", themeClass)}>
                    
                    {/* Header: Relógio e Logo */}
                    <header className="h-[100px] px-8 flex items-center justify-between border-b-4 border-black bg-white text-black">
                        <div className="flex items-center gap-4">
                            <span className="text-4xl font-black uppercase italic tracking-tighter">{t.title}</span>
                        </div>
                        <div className="flex flex-col items-end">
                            <span className="text-4xl font-black">{currentTime.toLocaleTimeString(lang, t.clockFormat)}</span>
                            <button id="btn-settings" onClick={() => setShowSettings(true)} className="flex items-center gap-2 uppercase font-bold text-xs opacity-50 underline">
                                {t.settings}
                            </button>
                        </div>
                    </header>

                    {/* Apps Grid */}
                    <main className={cn("flex-1 p-8 grid grid-cols-1 sm:grid-cols-2 gap-8 overflow-y-auto mb-[20px]", isAssistiveMode ? "h-[45%]" : "")}>
                        <button id="app-whatsapp" className={btnClass("bg-emerald-600")}>
                            <Icon name="phone" size={64} />
                            <span className="text-3xl font-black uppercase">WhatsApp</span>
                        </button>
                        <button id="app-emergency" className={btnClass("bg-red-600")}>
                            <Icon name="alert-triangle" size={64} />
                            <span className="text-3xl font-black uppercase">{t.emergency}</span>
                        </button>
                        <button id="app-phone" className={btnClass("bg-blue-600")}>
                            <Icon name="user" size={64} />
                            <span className="text-3xl font-black uppercase">{t.phone}</span>
                        </button>
                        <button id="app-new" className="p-8 border-4 border-dashed border-zinc-400 rounded-[40px] flex flex-col items-center justify-center gap-2 opacity-50">
                            <Icon name="plus" size={48} />
                            <span className="text-xl font-bold uppercase">{t.newApp}</span>
                        </button>
                    </main>

                    {/* Cursor Virtual (Assistivo) */}
                    {isAssistiveMode && (
                        <div className="fixed inset-0 pointer-events-none z-[400]">
                            <div 
                                className="absolute pointer-events-none transition-transform duration-75"
                                style={{ left: `${cursorPos.x}%`, top: `calc(${cursorPos.y}% + 100px)`, transform: 'translate(-32px, -32px)' }}
                            >
                                <div className="relative">
                                    {dwellProgress > 0 && (
                                        <svg className="absolute -inset-4 w-24 h-24 -rotate-90">
                                            <circle cx="48" cy="48" r="40" stroke="currentColor" strokeWidth="8" fill="none" className="text-black" strokeDasharray="251" strokeDashoffset={251 - (251 * dwellProgress / 100)} />
                                        </svg>
                                    )}
                                    <Icon name="mouse-pointer-2" size={64} className={highContrast ? "text-white" : "text-black fill-yellow-400 drop-shadow-xl"} />
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Painel de Controle Inferior */}
                    {isAssistiveMode && (
                        <section className="h-[40%] bg-white border-t-4 border-black flex flex-col">
                            <div className="h-16 flex border-b-4 border-black divide-x-4 divide-black">
                                <button className="flex-1 font-black flex items-center justify-center gap-2"><Icon name="arrow-left" size={20} />{t.back}</button>
                                <button className="flex-1 font-black flex items-center justify-center gap-2"><Icon name="home" size={20} />{t.home}</button>
                                <button className="flex-1 font-black flex items-center justify-center gap-2 text-red-600"><Icon name="alert-circle" size={20} />{t.help}</button>
                            </div>
                            <div className="flex-1 flex touch-none">
                                <div id="trackpad" 
                                    className="flex-1 bg-zinc-100 flex items-center justify-center relative touch-none"
                                    onPointerMove={handleMove}
                                    onPointerDown={(e) => { e.currentTarget.setPointerCapture(e.pointerId); handleMove(e); }}
                                >
                                    <span className="font-black text-2xl opacity-10 tracking-[1em]">{t.trackpad}</span>
                                </div>
                                <div className="w-24 border-l-4 border-black flex flex-col divide-y-4 divide-black">
                                    <button className="flex-1 flex items-center justify-center bg-zinc-50"><Icon name="zoom-in" /></button>
                                    <button className="flex-1 flex items-center justify-center bg-zinc-50"><Icon name="zoom-out" /></button>
                                </div>
                            </div>
                        </section>
                    )}

                    {/* Modal de Configurações */}
                    <AnimatePresence>
                        {showSettings && (
                            <div className="fixed inset-0 z-[500] bg-white text-black p-10 modal-enter flex flex-col">
                                <div className="flex justify-between items-center mb-12">
                                    <h2 className="text-5xl font-black italic">{t.settings}</h2>
                                    <button onClick={() => setShowSettings(false)} className="w-16 h-16 bg-black text-white rounded-full flex items-center justify-center">
                                        <Icon name="x" size={40} />
                                    </button>
                                </div>
                                
                                <div className="space-y-12 flex-1">
                                    <div className="space-y-4">
                                        <span className="font-black text-xs opacity-30 uppercase tracking-widest">{t.assistive}</span>
                                        <button 
                                            onClick={() => { setIsAssistiveMode(!isAssistiveMode); localStorage.setItem('al_assistive', !isAssistiveMode); }}
                                            className={cn("w-full p-8 border-4 border-black rounded-3xl font-black text-2xl flex justify-between items-center", isAssistiveMode ? "bg-yellow-400" : "bg-zinc-100")}
                                        >
                                            {isAssistiveMode ? "ATIVADO" : "DESATIVADO"}
                                            <Icon name={isAssistiveMode ? "check-circle" : "circle"} />
                                        </button>
                                    </div>

                                    <div className="space-y-4">
                                        <span className="font-black text-xs opacity-30 uppercase tracking-widest">{t.contrast}</span>
                                        <button 
                                            onClick={() => { setHighContrast(!highContrast); localStorage.setItem('al_contrast', !highContrast); }}
                                            className={cn("w-full p-8 border-4 border-black rounded-3xl font-black text-2xl", highContrast ? "bg-black text-white" : "bg-zinc-100")}
                                        >
                                            {highContrast ? "DESATIVAR" : "ATIVAR"}
                                        </button>
                                    </div>
                                </div>

                                <button onClick={() => setShowSettings(false)} className="w-full py-8 bg-yellow-400 border-4 border-black rounded-[40px] font-black text-3xl shadow-[8px_8px_0px_0px_rgba(0,0,0,1)]">
                                    {t.done}
                                </button>
                            </div>
                        )}
                    </AnimatePresence>
                </div>
            );
        }

        // Simulação básica do AnimatePresence para o single file
        function AnimatePresence({ children }) {
            return <>{children}</>;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Inicializar ícones lucide manualmente na carga
        window.addEventListener('load', () => {
            if (window.lucide) window.lucide.createIcons();
        });
    </script>
</body>
</html>
